<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youth-AI:Career Leap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* ====== 全局重置与高级感基调 ====== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #1e293b;
            background-color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-weight: 700;
            font-size: 1.25rem;
            color: #0f172a;
        }
        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }
        .nav-links a {
            text-decoration: none;
            color: #334155;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: #2563eb;
        }
        .btn {
            display: inline-block;
            padding: 10px 24px;
            background: #2563eb;
            color: white;
            border-radius: 6px;
            font-weight: 500;
            text-decoration: none;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .section {
            padding: 5rem 0;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 1.5rem;
        }
        .option-item {
            cursor: pointer;
            padding: 6px 12px !important;
            color: #000 !important;
        }
        .option-item.active {
            background: #0d6efd !important;
            color: white !important;
        }
        .loading {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0d6efd;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 999;
        }
        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">📘 Youth-AI:Career Leap</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a ></li>
            <li><a href="database.html">Database</a ></li>
            <li><a href="result.html">Result</a ></li>
        </ul>
    </nav>

    <section class="section">
        <div class="container">
            <h1>Survey</h1>
            <div id="box" class="mt-4"></div>
            <button id="submit" class="btn mt-4">Submit</button>
        </div>
    </section>

    <div class="loading" id="loading"></div>

    <script src="questions.js"></script>
<script>
    let answers = {};
    let box = document.getElementById("box");
    let btn = document.getElementById("submit");

    // 🔴 关键：等页面+数据完全加载后再渲染，解决空数组问题
    document.addEventListener('DOMContentLoaded', () => {
        // 兜底：如果questions没加载，打印报错
        if (typeof questions === 'undefined' || questions.length === 0) {
            box.innerHTML = "<p style='color:red;'>⚠️ 题目数据加载失败，请检查questions.js文件！</p >";
            console.error("questions数组为空或未定义，请检查questions.js");
            return;
        }

        // 渲染题目（中英对照+选项深色）
        questions.forEach(q => {
            let div = document.createElement("div");
            div.className = "card p-3 mb-3 shadow-sm";
            div.innerHTML = `
                <h5 style="color: #333; font-weight: bold;">${q.title_en || '无标题'}</h5>
                <p style="color: #888; font-size: 0.9em; margin: 5px 0 10px 0;">${q.title || '无标题'}</p >
                <div class="d-flex gap-2 mt-2 flex-wrap" data-id="${q.id}">
                    ${(q.options_en || []).map((optEn, index) => `
                        <div>
                            <span class="option-item badge bg-light p-2" style="color: #000 !important;">${optEn}</span>
                            <span style="color: #000; font-size: 0.8em; display: block; margin-top: 5px;">${(q.options || [])[index] || '无选项'}</span>
                        </div>
                    `).join('')}
                </div>
            `;
            box.appendChild(div);
        });

        // 严格单选+可取消重选逻辑
        box.addEventListener("click", function(e) {
            if (!e.target.classList.contains("option-item")) return;

            const currentOption = e.target;
            const questionContainer = currentOption.closest(".d-flex[data-id]");
            const pid = questionContainer.dataset.id;

            if (currentOption.classList.contains("active")) {
                currentOption.classList.remove("active");
                delete answers[pid];
            } else {
                questionContainer.querySelectorAll(".option-item").forEach(el => {
                    el.classList.remove("active");
                });
                currentOption.classList.add("active");
                answers[pid] = `${currentOption.textContent} / ${currentOption.nextElementSibling.textContent}`;
            }

            btn.disabled = Object.keys(answers).length !== questions.length;
        });

        // 提交按钮逻辑
        btn.addEventListener("click", function() {
            const result = questions.map((q, index) => {
                return {
                    title: q.title,
                    ans: answers[q.id] || "未作答"
                };
            });
            sessionStorage.setItem("result", JSON.stringify(result));
            window.location.href = "result.html";
        });

        // 初始化：隐藏加载动画，禁用提交按钮
        document.getElementById('loading').style.display = 'none';
        btn.disabled = true;
    });
</script>
