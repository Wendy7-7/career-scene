<!-- home.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareerLeap - AI-Powered Career Simulator</title>
  <li><a href="index.html">Home</a></li>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .navbar {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #e2e8f0;
    }
    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .hero-content {
      max-width: 700px;
      background: white;
      border-radius: 2rem;
      padding: 3rem 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
    }
    .hero h1 {
      font-size: 2.8rem;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 1rem;
    }
    .hero .emoji {
      font-size: 2.5rem;
    }
    .hero p {
      color: #475569;
      font-size: 1.15rem;
      line-height: 1.8;
      margin-bottom: 2rem;
    }
    .btn-start {
      background: #2563eb;
      border: none;
      color: white;
      font-size: 1.2rem;
      font-weight: 600;
      padding: 14px 48px;
      border-radius: 50px;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(37,99,235,0.3);
    }
    .btn-start:hover {
      background: #1d4ed8;
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(37,99,235,0.4);
    }
    footer {
      text-align: center;
      padding: 1rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">📘 CareerLeap</a>
    </div>
  </nav>

  <main class="hero">
    <div class="hero-content">
      <div class="emoji mb-3">🚀🤖💼</div>
      <h1>CareerLeap</h1>
      <p>
        AI 驱动的青年职业情境模拟器<br>
        通过科学测评与人工智能，为你量身推荐最适合的职业方向，<br>
        并提供个性化的成长建议。
      </p>
      <a href="question.html" class="btn btn-start">开始测评 →</a>
    </div>
  </main>

  <footer>
    <small>© 2024 CareerLeap · 青年职业 AI 助手</small>
  </footer>
</body>
</html>
