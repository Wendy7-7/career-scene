<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result - Youth-AI:Career Leap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #1e293b;
            background-color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-weight: 700;
            font-size: 1.25rem;
            color: #0f172a;
        }
        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }
        .nav-links a {
            text-decoration: none;
            color: #334155;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: #2563eb;
        }
        .btn {
            display: inline-block;
            padding: 10px 24px;
            background: #2563eb;
            color: white;
            border-radius: 6px;
            font-weight: 500;
            text-decoration: none;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .section {
            padding: 3rem 0;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">📘 Youth-AI:Career Leap</div>
        <ul class="nav-links">
            <li><a href=" ">Home</a ></li>
            <li><a href="database.html">Database</a ></li>
            <li><a href="result.html">Result</a ></li>
        </ul>
    </nav>

    <section class="section">
        <div class="container">
            <h1>Submitted Successfully!</h1>
            <div id="result"></div>
            <a href="index.html" class="btn btn-primary mt-4" style="text-decoration: none;">Back</a >
        </div>
    </section>

    <script>
        let data = JSON.parse(sessionStorage.getItem("result") || "[]");
        let res = document.getElementById("result");

        data.forEach((item, i) => {
            res.innerHTML += `
            <div class="mb-3">
                <h6>${i+1}. ${item.title}</h6>
                <p class="text-success">Your Answer: ${item.ans}</p >
            </div>
            `;
        });
    </script>
</body>
</html>
